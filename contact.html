<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact us — Scheme Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-logo">
        <a href="index.html"><img src="assets/logo-light.png" alt="Scheme Staff — home"></a>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link nav-page">Home</a>
        <a href="about.html" class="nav-link nav-page">About</a>
        <a href="fees.html" class="nav-link nav-page">Fees</a>
        <a href="contact.html" class="nav-link nav-page">Contact</a>
        <a href="login.html" class="nav-link">Log in</a>
        <a href="register-employer.html" class="btn btn-outline">Hire Staff</a>
        <a href="register-employee.html" class="btn btn-primary">Find Work</a>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-inner">
      <p class="section-eyebrow">Contact us</p>
      <h1 class="page-title">Let's <span class="highlight">talk.</span></h1>
      <p class="page-subtitle">Questions about hiring, registering, pricing or anything else — send us a message and we'll get back to you.</p>
    </div>
  </div>

  <!-- CONTACT FORM -->
  <main class="form-page">
    <div class="form-container">
      <form>
        <div class="form-section">
          <div class="form-grid">
            <div class="form-group">
              <label>Your name <span class="required">*</span></label>
              <input type="text" placeholder="First and last name">
            </div>
            <div class="form-group">
              <label>Email address <span class="required">*</span></label>
              <input type="email" placeholder="you@email.com">
            </div>
            <div class="form-group">
              <label>Phone number <span class="optional">(optional)</span></label>
              <input type="tel" placeholder="e.g. 082 123 4567">
            </div>
            <div class="form-group">
              <label>I am... <span class="required">*</span></label>
              <select>
                <option value="" disabled selected>Select...</option>
                <option>An employer looking to hire</option>
                <option>A candidate looking for work</option>
                <option>A training provider</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group full">
              <label>Message <span class="required">*</span></label>
              <textarea placeholder="How can we help?" rows="6"></textarea>
            </div>
          </div>
        </div>
        <div class="form-footer">
          <button type="submit" class="btn btn-primary btn-large btn-submit">Send message</button>
        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="section-inner footer-inner">
      <img src="assets/logo-light.png" alt="Scheme Staff" class="footer-logo">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="fees.html">Fees</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms &amp; Conditions</a>
      </div>
      <p class="footer-copy">© 2026 Scheme Staff. Property Recruitment.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
